<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container{
            display: flex;
            flex-wrap: wrap;
        }

        .card {
            width: 380px;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 5px 10px rgba(64, 1, 1, 0.3);
            cursor: pointer;
            margin:5px;
        }

        .card:hover {
            transform: translateY(-4px);
            background-color: #e74c3c;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;            
        }

        .card-content {
            padding: 12px 14px;
        }

        .card-source {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .card-source .icon {
            color: #e74c3c;
            margin-right: 6px;
        }

        .source-name {
            font-weight: bold;
            margin-right: 4px;
        }

        .time {
            color: #999;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #222;
            margin: 8px 0 12px;
            line-height: 1.3;
        }

        .card-actions {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="https://ogimg.infoglobo.com.br/in/18459285-a2a-4cc/FT1086A/12509889_10154054990229305_1485385305484907976_n.jpg"
                alt="Imagem" class="card-img">

            <div class="card-content">
                <div class="card-source">
                    <span class="icon">⚠️</span>
                    <span class="source-name">ZanellaNews</span>
                    <span class="time">• 2d</span>
                </div>

                <h2 class="card-title">
                    Messi conquista sua 5 Bola de ouro
                </h2>

                <div class="card-actions">
                    <span>1k</span>
                    <span>29</span>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="https://diariodopara.com.br/wp-content/uploads/2024/07/20150717114901_0-jpeg.webp"
                alt="Imagem" class="card-img">

            <div class="card-content">
                <div class="card-source">
                    <span class="icon">⚠️</span>
                    <span class="source-name">ZanellaNews</span>
                    <span class="time">• 2d</span>
                </div>

                <h2 class="card-title">
                    Brasil conquista a sua 5 copa do mundo!
                </h2>

                <div class="card-actions">
                    <span>👍 50k</span>
                    <span>💬 29</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
