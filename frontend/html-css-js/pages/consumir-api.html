<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de CEP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        h2 { color: #333; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        #status { margin-top: 12px; color: #e74c3c; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2>Busca de CEP</h2>

    <label>CEP</label>
    <input type="text" id="cep" placeholder="Ex: 89107-000"
        onblur="buscarCep()" onkeydown="verificarEnter(event)" value="89012-170" />

    <label>Rua</label>
    <input type="text" id="rua" readonly />

    <label>Bairro</label>
    <input type="text" id="bairro" readonly />

    <label>Cidade</label>
    <input type="text" id="cidade" readonly />

    <label>Estado</label>
    <input type="text" id="estado" readonly />

    <p id="status"></p>

    <script>
        function buscarCep() {
            const cepInput = document.getElementById('cep')
            const cep = cepInput.value.replace(/\D/g, '') // remove traço
            const status = document.getElementById('status')

            if (cep.length !== 8) {
                status.textContent = 'CEP inválido. Informe 8 dígitos.'
                return
            }

            status.textContent = 'Buscando...'

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(res => res.json())
                .then(dados => {
                    if (dados.erro) {
                        status.textContent = 'CEP não encontrado.'
                        return
                    }
                    document.getElementById('rua').value = dados.logradouro
                    document.getElementById('bairro').value = dados.bairro
                    document.getElementById('cidade').value = dados.localidade
                    document.getElementById('estado').value = dados.uf
                    status.textContent = ''
                })
                .catch(() => {
                    status.textContent = 'Erro ao buscar o CEP. Tente novamente.'
                })
        }

        function verificarEnter(event) {
            if (event.key === 'Enter') {
                buscarCep()
            }
        }
    </script>
</body>
</html>
