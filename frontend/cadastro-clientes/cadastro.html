<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Cliente</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="centralizado">

  <div class="card">

    <h2> Cadastrar Cliente</h2>

    <!-- Mensagem de sucesso ou erro -->
    <div id="msg" class="msg"></div>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="telefone" placeholder="(47) 99999-9999">

    <input type="text" id="cep" placeholder="CEP" onblur="buscarCEP()">
    <p id="msg-cep" class="msg-cep">🔍 Buscando endereço...</p>

    <input type="text" id="rua" placeholder="Rua" readonly>
    <input type="text" id="bairro" placeholder="Bairro" readonly>
    <input type="text" id="cidade" placeholder="Cidade" readonly>
    <input type="text" id="estado" placeholder="Estado" readonly>

    <button onclick="cadastrar()"> Salvar Cliente</button>
    <button class="btn-voltar" style="width:100%; margin-top:8px;" onclick="location.href='index.html'">← Voltar</button>

  </div>

  <script src="script.js"></script>

</body>

</html>
