<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMax - Batman</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Cabeçalho com info do filme -->
  <div class="cabecalho">
    <h1>🎬 CineMax</h1>
    <div class="filme-info">
      <span class="filme-nome">Batman</span>
      <span class="filme-detalhe">Hoje • 20h30 • Sala 3</span>
    </div>
  </div>

  <div class="container">

    <!-- Tela do cinema -->
    <div class="tela">
      <div class="tela-barra"></div>
      <p class="tela-texto">TELA</p>
    </div>

    <!-- Grade de assentos -->
    <div id="sala" class="sala"></div>

    <!-- Legenda -->
    <div class="legenda">
      <div class="legenda-item">
        <div class="assento-exemplo livre"></div>
        <span>Livre</span>
      </div>
      <div class="legenda-item">
        <div class="assento-exemplo selecionado"></div>
        <span>Selecionado</span>
      </div>
      <div class="legenda-item">
        <div class="assento-exemplo ocupado"></div>
        <span>Ocupado</span>
      </div>
    </div>

    <!-- Resumo da compra -->
    <div class="resumo">
      <p id="texto-resumo">Nenhum assento selecionado.</p>
      <p id="texto-total" class="total"></p>
      <button id="btn-confirmar" onclick="confirmar()" disabled>Confirmar</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
